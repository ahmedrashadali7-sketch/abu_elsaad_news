<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أبو السعد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #2C3E50;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .logo h1 span {
            color: #C49A6C;
        }
        
        .logo p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #C49A6C;
            box-shadow: 0 0 0 3px rgba(196,154,108,0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #C49A6C;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover:not(:disabled) {
            background: #a57d54;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196,154,108,0.3);
        }
        
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-right: 4px solid #dc3545;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border-right: 4px solid #28a745;
        }
        
        .info-box {
            background: #e7f3ff;
            color: #004085;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            text-align: center;
        }
        
        .info-box .credentials {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: #C49A6C;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>أبو السعد <span>للاخبار</span></h1>
            <p>دخول المشرفين</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="your_email@gmail.com">
        </div>
        
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="your_password">
        </div>
        
        <button class="btn-login" onclick="handleLogin()" id="loginBtn">تسجيل الدخول</button>
        
        
        
        <div class="back-link">
            <a href="index.html">← العودة للرئيسية</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- ملف الإعدادات -->
    <script src="js/firebase-config.js"></script>

    <script>
        // التأكد من تحميل Firebase
        console.log('🔥 صفحة تسجيل الدخول');
        console.log('Firebase loaded:', typeof firebase !== 'undefined');

        const auth = firebase.auth();
        const loginBtn = document.getElementById('loginBtn');

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.className = `message ${type}`;
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        // تسجيل الدخول
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('📝 محاولة تسجيل الدخول:', email);
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '⏳ جاري تسجيل الدخول...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ نجاح تسجيل الدخول:', userCredential.user.email);
                window.location.href = 'admin.html';
                
            } catch (error) {
                console.error('❌ خطأ:', error.code, error.message);
                
                if (error.code === 'auth/user-not-found') {
                    showMessage('❌ المستخدم غير موجود. تأكد من إنشائه في Firebase Console', 'error');
                } else if (error.code === 'auth/wrong-password') {
                    showMessage('❌ كلمة المرور غير صحيحة', 'error');
                } else {
                    showMessage('❌ خطأ: ' + error.message, 'error');
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'تسجيل الدخول';
            }
        };
    </script>
</body>
</html>
