<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل... - أبو السعد للاخبار</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="" id="metaDescription">
    <meta name="keywords" content="" id="metaKeywords">
    <meta name="author" content="" id="metaAuthor">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="" id="ogTitle">
    <meta property="og:description" content="" id="ogDescription">
    <meta property="og:image" content="" id="ogImage">
    <meta property="og:url" content="" id="ogUrl">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="أبو السعد للاخبار">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="" id="twitterTitle">
    <meta name="twitter:description" content="" id="twitterDescription">
    <meta name="twitter:image" content="" id="twitterImage">
    
    <!-- Canonical URL -->
    <link rel="canonical" id="canonicalUrl" href="">
    
    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="أبو السعد للاخبار - RSS" href="/rss.xml">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C49A6C">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23C49A6C'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3Eأ%3C/text%3E%3C/svg%3E">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #C49A6C;
            --primary-dark: #a57d54;
            --primary-light: #e8d9cc;
            --secondary: #2C3E50;
            --secondary-dark: #1a252f;
            --danger: #e74c3c;
            --success: #27ae60;
            --text-light: #666;
            --text-dark: #2C3E50;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 5px 20px rgba(0,0,0,0.1);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.15);
            --radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--text-dark);
            line-height: 1.8;
        }

        .header {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            padding: 25px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
            position: relative;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
            transition: var(--transition);
            display: inline-block;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo span {
            color: var(--primary);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .article-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .article-header {
            padding: 40px 40px 25px;
            background: linear-gradient(to bottom, #fff, #fefefe);
            border-bottom: 1px solid #eee;
        }

        .article-category {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(196, 154, 108, 0.3);
        }

        .article-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            gap: 25px;
            color: var(--text-light);
            font-size: 0.95rem;
            flex-wrap: wrap;
            padding: 15px 0 10px;
            border-top: 1px solid #eee;
            margin-top: 15px;
        }

        .article-meta > div, 
        .article-meta > span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .article-meta i {
            color: var(--primary);
            font-size: 1rem;
        }

        .author-badge {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 6px 18px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .author-badge:hover {
            transform: translateY(-2px);
            background: var(--primary-light);
        }

        .author-badge i {
            color: var(--primary);
        }

        .article-image-container {
            padding: 0 40px;
            margin: 30px 0;
        }

        .article-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: transform 0.5s ease;
        }

        .article-image:hover {
            transform: scale(1.02);
        }

        .article-content {
            padding: 0 40px 40px;
            font-size: 1.1rem;
            color: #444;
            line-height: 1.9;
        }

        .article-content p {
            margin-bottom: 1.8rem;
        }

        .article-content p:first-child {
            font-size: 1.15rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .article-content h2 {
            font-size: 1.8rem;
            color: var(--secondary);
            margin: 2rem 0 1rem;
            padding-right: 15px;
            border-right: 4px solid var(--primary);
        }

        .article-content h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 1rem;
            color: var(--secondary);
        }

        .article-content img {
            max-width: 100%;
            border-radius: var(--radius);
            margin: 20px 0;
            box-shadow: var(--shadow);
        }

        .article-content blockquote {
            background: #f8f9fa;
            border-right: 4px solid var(--primary);
            padding: 20px 25px;
            margin: 25px 0;
            border-radius: 12px;
            font-style: italic;
            color: #555;
        }

        .article-footer {
            padding: 35px 40px;
            background: linear-gradient(135deg, #fafbfc, #ffffff);
            border-top: 1px solid #eee;
        }

        .share-section {
            margin-bottom: 30px;
            text-align: center;
        }

        .share-title {
            font-size: 1.2rem;
            color: var(--secondary);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: #f0f2f5;
            border-radius: 40px;
        }

        .share-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .share-btn {
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .share-btn.facebook { background: #1877f2; box-shadow: 0 2px 8px rgba(24,119,242,0.3); }
        .share-btn.twitter { background: #1da1f2; box-shadow: 0 2px 8px rgba(29,161,242,0.3); }
        .share-btn.whatsapp { background: #25d366; box-shadow: 0 2px 8px rgba(37,211,102,0.3); }
        .share-btn.telegram { background: #0088cc; box-shadow: 0 2px 8px rgba(0,136,204,0.3); }

        .share-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            padding: 12px 25px;
            background: #f8f9fa;
            border-radius: 40px;
            margin-top: 10px;
        }

        .back-link:hover {
            gap: 15px;
            color: var(--primary-dark);
            background: var(--primary-light);
            transform: translateX(-5px);
        }

        .loading, .error {
            text-align: center;
            padding: 100px 20px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeInUp 0.5s ease;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error h3 {
            color: var(--danger);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .footer {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            padding: 50px 0 30px;
            margin-top: 60px;
            text-align: center;
        }

        .footer p {
            color: #ecf0f1;
            margin-bottom: 15px;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            padding: 0 12px;
        }

        .footer a:hover {
            color: white;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 999;
        }

        .scroll-top.show {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            background: var(--primary-dark);
            transform: translateY(-5px);
        }
        
        .seo-tags-hidden {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            overflow: hidden !important;
            z-index: -999 !important;
        }

        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            
            .article-title { font-size: 1.8rem; }
            
            .article-meta {
                flex-direction: column;
                gap: 12px;
            }
            
            .article-header,
            .article-content,
            .article-footer {
                padding: 25px;
            }
            
            .article-image-container {
                padding: 0 25px;
            }
            
            .share-buttons {
                justify-content: center;
            }
            
            .share-btn {
                padding: 10px 20px;
            }
        }

        @media (max-width: 480px) {
            .article-title { font-size: 1.5rem; }
            
            .share-btn span { display: none; }
            
            .share-btn {
                padding: 12px;
                border-radius: 50%;
            }
            
            .share-btn i {
                margin: 0;
                font-size: 1.3rem;
            }
            
            .article-meta > div, 
            .article-meta > span {
                font-size: 0.85rem;
            }
        }
    </style>
    <!-- شعار الموقع (Favicon) - يظهر في المتصفح -->
<link rel="icon" type="image/png" href="images/logo.png">

<!-- شعار الموقع لنتائج البحث (Open Graph & Twitter Card) -->
<meta property="og:image" content="https://ahmedrashadali7-sketch.github.io/abu_elsaad_news/images/logo.png">
<meta property="og:image:alt" content="شعار أبو السعد للاخبار">
<meta name="twitter:image" content="https://ahmedrashadali7-sketch.github.io/abu_elsaad_news/images/logo.png">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                أبو السعد <span>للاخبار</span>
            </a>
        </div>
    </header>

    <div class="container" id="articleContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الخبر...</p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 أبو السعد للاخبار - جميع الحقوق محفوظة</p>
            <p>
                <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a> | 
                <a href="login.html"><i class="fas fa-user-lock"></i> دخول المشرف</a>
            </p>
        </div>
    </footer>

    <div class="scroll-top" id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- تحميل Firebase بشكل غير متزامن (لا يؤخر ظهور الصفحة) -->
    <script>
        // تحميل Firebase بعد تحميل الصفحة بالكامل
        (function() {
            function loadScript(src, callback) {
                var script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = callback;
                document.head.appendChild(script);
            }

            function startApp(db) {
                // كل دوال الموقع هنا
                window.addEventListener('scroll', function() {
                    const scrollTop = document.getElementById('scrollTop');
                    if (window.pageYOffset > 300) {
                        scrollTop.classList.add('show');
                    } else {
                        scrollTop.classList.remove('show');
                    }
                });

                function escapeHtml(text) {
                    if (!text) return '';
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                function updateCanonicalAndBreadcrumb(newsTitle, category) {
                    const canonical = document.getElementById('canonicalUrl');
                    if (canonical) {
                        canonical.href = window.location.href;
                    }
                }

                const urlParams = new URLSearchParams(window.location.search);
                const newsId = urlParams.get('id');

                if (!newsId) {
                    document.getElementById('articleContainer').innerHTML = `
                        <div class="error">
                            <i class="fas fa-search" style="font-size: 4rem; color: #e74c3c; margin-bottom: 20px;"></i>
                            <h3>❌ الخبر غير موجود</h3>
                            <p>لم يتم العثور على الخبر المطلوب</p>
                            <a href="index.html" class="back-link" style="margin-top: 20px;">← العودة للرئيسية</a>
                        </div>
                    `;
                } else {
                    db.collection('news').doc(newsId).get()
                        .then((doc) => {
                            if (!doc.exists) {
                                document.getElementById('articleContainer').innerHTML = `
                                    <div class="error">
                                        <i class="fas fa-newspaper" style="font-size: 4rem; color: #e74c3c; margin-bottom: 20px;"></i>
                                        <h3>❌ الخبر غير موجود</h3>
                                        <p>عذراً، هذا الخبر قد يكون تم حذفه أو نقله</p>
                                        <a href="index.html" class="back-link" style="margin-top: 20px;">← العودة للرئيسية</a>
                                    </div>
                                `;
                                return;
                            }

                            const news = doc.data();
                            const date = news.createdAt ? news.createdAt.toDate() : new Date();
                            const tags = news.tags || [];
                            
                            const metaDescription = news.excerpt || news.title;
                            const metaKeywords = tags.join(', ');
                            const currentUrl = window.location.href;
                            
                            document.title = `${news.title} - أبو السعد للاخبار`;
                            
                            const setMeta = (id, content) => {
                                const el = document.getElementById(id);
                                if (el) el.setAttribute('content', content);
                            };
                            
                            setMeta('metaDescription', metaDescription.substring(0, 160));
                            setMeta('metaKeywords', metaKeywords);
                            setMeta('metaAuthor', news.author || 'أبو السعد للاخبار');
                            setMeta('ogTitle', news.title);
                            setMeta('ogDescription', metaDescription.substring(0, 200));
                            setMeta('ogImage', news.image || 'https://via.placeholder.com/800x400?text=أبو+السعد');
                            setMeta('ogUrl', currentUrl);
                            setMeta('twitterTitle', news.title);
                            setMeta('twitterDescription', metaDescription.substring(0, 200));
                            setMeta('twitterImage', news.image || 'https://via.placeholder.com/800x400?text=أبو+السعد');

                            updateCanonicalAndBreadcrumb(news.title, news.category);

                            db.collection('news').doc(newsId).update({
                                views: (news.views || 0) + 1
                            }).catch(() => {});

                            const formattedDate = date.toLocaleDateString('ar-EG', {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric'
                            });

                            const formattedTime = date.toLocaleTimeString('ar-EG', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });

                            let hiddenTagsHTML = '';
                            if (tags.length > 0) {
                                hiddenTagsHTML = `
                                    <div class="seo-tags-hidden" aria-hidden="true">
                                        <span class="seo-keywords">الكلمات المفتاحية: ${tags.map(t => '#' + t).join(', ')}</span>
                                        ${tags.map(tag => `<a href="search.html?tag=${encodeURIComponent(tag)}" rel="tag" class="seo-tag">#${tag}</a>`).join('')}
                                    </div>
                                `;
                            }

                            document.getElementById('articleContainer').innerHTML = `
                                <article class="article-card">
                                    <div class="article-header">
                                        <div class="article-category">
                                            <i class="fas fa-tag"></i> ${escapeHtml(news.category || 'عام')}
                                        </div>
                                        <h1 class="article-title">${escapeHtml(news.title)}</h1>
                                        <div class="article-meta">
                                            <div class="author-badge">
                                                <i class="fas fa-user-edit"></i>
                                                <span>${escapeHtml(news.author || 'أبو السعد')}</span>
                                            </div>
                                            <span><i class="fas fa-calendar-alt"></i> ${formattedDate}</span>
                                            <span><i class="fas fa-clock"></i> ${formattedTime}</span>
                                            <span><i class="fas fa-eye"></i> ${(news.views || 0) + 1} مشاهدة</span>
                                        </div>
                                    </div>

                                    <div class="article-image-container">
                                        <img src="${news.image || 'https://via.placeholder.com/800x400?text=أبو+السعد'}" 
                                             alt="${escapeHtml(news.title)}" 
                                             class="article-image"
                                             onerror="this.src='https://via.placeholder.com/800x400?text=صورة+غير+متوفرة'">
                                    </div>

                                    <div class="article-content">
                                        ${news.content || ''}
                                    </div>

                                    <div class="article-footer">
                                        <div class="share-section">
                                            <div class="share-title">
                                                <i class="fas fa-share-alt"></i>
                                                <span>شارك هذا الخبر</span>
                                            </div>
                                            <div class="share-buttons">
                                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" 
                                                   target="_blank" class="share-btn facebook">
                                                    <i class="fab fa-facebook-f"></i> <span>فيسبوك</span>
                                                </a>
                                                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(news.title)}&url=${encodeURIComponent(window.location.href)}" 
                                                   target="_blank" class="share-btn twitter">
                                                    <i class="fab fa-twitter"></i> <span>تويتر</span>
                                                </a>
                                                <a href="https://wa.me/?text=${encodeURIComponent(news.title + ' ' + window.location.href)}" 
                                                   target="_blank" class="share-btn whatsapp">
                                                    <i class="fab fa-whatsapp"></i> <span>واتساب</span>
                                                </a>
                                                <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(news.title)}" 
                                                   target="_blank" class="share-btn telegram">
                                                    <i class="fab fa-telegram-plane"></i> <span>تليجرام</span>
                                                </a>
                                            </div>
                                        </div>
                                        <div style="text-align: center;">
                                            <a href="index.html" class="back-link">
                                                <i class="fas fa-arrow-right"></i> العودة للرئيسية
                                            </a>
                                        </div>
                                    </div>
                                    ${hiddenTagsHTML}
                                </article>
                                
                                <script type="application/ld+json">
                                {
                                    "@context": "https://schema.org",
                                    "@type": "NewsArticle",
                                    "headline": "${news.title.replace(/"/g, '\\"')}",
                                    "description": "${(news.excerpt || news.title).replace(/"/g, '\\"').substring(0, 200)}",
                                    "image": "${news.image || 'https://via.placeholder.com/800x400?text=أبو+السعد'}",
                                    "datePublished": "${date.toISOString()}",
                                    "dateModified": "${date.toISOString()}",
                                    "author": {
                                        "@type": "Person",
                                        "name": "${news.author || 'أبو السعد للاخبار'}"
                                    },
                                    "publisher": {
                                        "@type": "Organization",
                                        "name": "أبو السعد للاخبار",
                                        "logo": {
                                            "@type": "ImageObject",
                                            "url": "https://ahmedrashadali7-sketch.github.io/abu_elsaad_news/images/logo.png"
                                        }
                                    },
                                    "mainEntityOfPage": {
                                        "@type": "WebPage",
                                        "@id": "${currentUrl}"
                                    },
                                    "keywords": "${metaKeywords}",
                                    "about": [${tags.map(tag => `"${tag.replace(/"/g, '\\"')}"`).join(', ')}]
                                }
                                <\/script>
                            `;
                        })
                        .catch((error) => {
                            console.error('❌ خطأ:', error);
                            document.getElementById('articleContainer').innerHTML = `
                                <div class="error">
