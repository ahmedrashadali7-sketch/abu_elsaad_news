<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إدارة الأخبار - أبو السعد للاخبار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #C49A6C;
            --primary-dark: #a57d54;
            --secondary: #2C3E50;
            --secondary-dark: #1e2b38;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --info: #3498db;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --border: #dee2e6;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 5px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            padding: 25px 20px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header h1 {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .header h1 span {
            color: var(--primary);
        }

        .header p {
            color: #bdc3c7;
            font-size: clamp(0.85rem, 3vw, 1rem);
            position: relative;
            z-index: 1;
        }

        /* بطاقات الإحصائيات - متجاوبة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 18px 12px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .stat-card i {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-card .number {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 800;
            color: var(--secondary);
        }

        .stat-card .label {
            color: var(--gray);
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            margin-top: 5px;
        }

        /* شريط الإجراءات - متجاوب */
        .actions-bar {
            background: white;
            padding: 15px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(196, 154, 108, 0.1);
        }

        .search-box button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .filter-select {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
            min-width: 130px;
        }

        .btn-back {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        /* جدول الأخبار - متجاوب للجوال */
        .table-container {
            background: white;
            border-radius: var(--radius-md);
            overflow-x: auto;
            box-shadow: var(--shadow-md);
        }

        .news-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .news-table th {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            padding: 14px 12px;
            text-align: right;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .news-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 0.85rem;
        }

        .news-table tr {
            transition: var(--transition);
        }

        .news-table tr:hover {
            background: var(--light);
        }

        .news-title {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
            color: var(--secondary);
        }

        .category-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .views-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--light);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--gray);
            white-space: nowrap;
        }

        /* أزرار الإجراءات - متجاوبة */
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn.view {
            background: var(--success);
            color: white;
        }

        .action-btn.edit {
            background: var(--info);
            color: white;
        }

        .action-btn.delete {
            background: var(--danger);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* نافذة التعديل - متجاوبة للجوال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 15px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            max-width: 650px;
            width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: white;
            transition: var(--transition);
        }

        .close-modal:hover {
            transform: scale(1.1);
            color: var(--primary);
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--secondary);
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary);
            margin-left: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(196, 154, 108, 0.1);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .image-preview {
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }

        .modal-footer {
            padding: 16px 20px;
            background: var(--light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--success), #219a52);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel {
            background: var(--gray);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover,
        .btn-cancel:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* تنبيهات توست */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px;
            max-width: 350px;
            background: white;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            border-right: 4px solid;
        }

        .toast.success {
            border-right-color: var(--success);
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error {
            border-right-color: var(--danger);
        }

        .toast.error i {
            color: var(--danger);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* حالة التحميل */
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 12px;
        }

        /* شاشة الجوال الصغيرة جداً */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 12px 8px;
            }

            .actions-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .filter-select {
                width: 100%;
            }

            .btn-back {
                justify-content: center;
            }

            .action-buttons {
                flex-direction: column;
                gap: 5px;
            }

            .action-btn {
                justify-content: center;
                width: 100%;
            }

            .modal-content {
                margin: 10px;
            }

            .modal-footer {
                flex-direction: column;
            }

            .btn-save,
            .btn-cancel {
                justify-content: center;
                width: 100%;
            }

            .toast {
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }

        /* شاشة التابلت */
        @media (min-width: 481px) and (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .actions-bar {
                flex-wrap: wrap;
            }

            .search-box {
                min-width: 250px;
            }
        }

        /* شاشة كبيرة */
        @media (min-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>أبو السعد <span>للاخبار</span></h1>
            <p><i class="fas fa-edit"></i> لوحة إدارة الأخبار - تعديل وحذف الأخبار</p>
        </div>

        <!-- إحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-newspaper"></i>
                <div class="number" id="totalNews">0</div>
                <div class="label">إجمالي الأخبار</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <div class="number" id="totalViews">0</div>
                <div class="label">إجمالي المشاهدات</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-tags"></i>
                <div class="number" id="totalCategories">0</div>
                <div class="label">الأقسام المختلفة</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-user"></i>
                <div class="number" id="totalAuthors">0</div>
                <div class="label">الكتّاب</div>
            </div>
        </div>

        <!-- شريط الإجراءات -->
        <div class="actions-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 بحث في العناوين...">
                <button onclick="searchNews()"><i class="fas fa-search"></i> بحث</button>
            </div>
            <select id="categoryFilter" class="filter-select" onchange="filterByCategory()">
                <option value="all">📰 جميع الأقسام</option>
                <option value="سياسة">🏛️ سياسة</option>
                <option value="رياضة">⚽ رياضة</option>
                <option value="فن">🎭 فن</option>
                <option value="اقتصاد">📈 اقتصاد</option>
                <option value="تكنولوجيا">💻 تكنولوجيا</option>
                <option value="صحة">❤️ صحة</option>
                <option value="تعليم">🎓 تعليم</option>
                <option value="حوادث">🚗 حوادث</option>
            </select>
            <button class="btn-back" onclick="location.href='admin.html'">
                <i class="fas fa-arrow-right"></i>
                العودة للوحة التحكم
            </button>
        </div>

        <!-- جدول الأخبار -->
        <div class="table-container">
            <div id="newsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>جاري تحميل الأخبار...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة التعديل -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> تعديل الخبر</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> عنوان الخبر</label>
                    <input type="text" id="editTitle" placeholder="أدخل عنوان الخبر">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> ملخص الخبر</label>
                    <textarea id="editExcerpt" placeholder="ملخص مختصر للخبر"></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-file-alt"></i> المحتوى الكامل</label>
                    <textarea id="editContent" rows="6" placeholder="المحتوى الكامل للخبر"></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> القسم</label>
                    <select id="editCategory">
                        <option value="سياسة">سياسة</option>
                        <option value="رياضة">رياضة</option>
                        <option value="فن">فن</option>
                        <option value="اقتصاد">اقتصاد</option>
                        <option value="تكنولوجيا">تكنولوجيا</option>
                        <option value="صحة">صحة</option>
                        <option value="تعليم">تعليم</option>
                        <option value="حوادث">حوادث</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-image"></i> رابط الصورة</label>
                    <input type="text" id="editImage" placeholder="https://example.com/image.jpg" oninput="previewEditImage()">
                    <div id="editImagePreview" class="image-preview">
                        <img id="editPreviewImg" src="" alt="معاينة الصورة">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-pen"></i> اسم الكاتب</label>
                    <input type="text" id="editAuthor" placeholder="اسم الكاتب">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditModal()">
                    <i class="fas fa-times"></i> إلغاء
                </button>
                <button class="btn-save" onclick="saveEdit()">
                    <i class="fas fa-save"></i> حفظ التغييرات
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiLnQKblUsRxmz6rUWAb7RpbFUakeWX_E",
            authDomain: "abu-el-saad-news.firebaseapp.com",
            projectId: "abu-el-saad-news",
            storageBucket: "abu-el-saad-news.firebasestorage.app",
            messagingSenderId: "127394884030",
            appId: "1:127394884030:web:52a31322a180bc717931ef"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let allNews = [];
        let currentEditId = null;
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                loadNews();
            }
        });
        
        async function loadNews() {
            const container = document.getElementById('newsList');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري تحميل الأخبار...</p></div>';
            
            try {
                const snapshot = await db.collection('news').orderBy('createdAt', 'desc').get();
                allNews = [];
                snapshot.forEach(doc => {
                    allNews.push({ id: doc.id, ...doc.data() });
                });
                displayNews(allNews);
                updateStats();
            } catch (error) {
                console.error('خطأ:', error);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>حدث خطأ في تحميل الأخبار</p></div>';
            }
        }
        
        function displayNews(news) {
            const container = document.getElementById('newsList');
            
            if (news.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>لا توجد أخبار لعرضها</p></div>';
                return;
            }
            
            let html = `
                <table class="news-table">
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>القسم</th>
                            <th>الكاتب</th>
                            <th>التاريخ</th>
                            <th>المشاهدات</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            news.forEach(item => {
                const date = item.createdAt ? item.createdAt.toDate() : new Date();
                const formattedDate = date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
                
                html += `
                    <tr>
                        <td class="news-title" title="${item.title.replace(/"/g, '&quot;')}">${item.title.substring(0, 50)}${item.title.length > 50 ? '...' : ''}</td>
                        <td><span class="category-badge">${item.category || 'عام'}</span></td>
                        <td>${item.author || 'أبو السعد'}</td>
                        <td>${formattedDate}</td>
                        <td><span class="views-badge"><i class="fas fa-eye"></i> ${item.views || 0}</span></td>
                        <td class="action-buttons">
                            <button class="action-btn view" onclick="viewNews('${item.id}')" title="معاينة">
                                <i class="fas fa-eye"></i> معاينة
                            </button>
                            <button class="action-btn edit" onclick="openEditModal('${item.id}')" title="تعديل">
                                <i class="fas fa-edit"></i> تعديل
                            </button>
                            <button class="action-btn delete" onclick="deleteNews('${item.id}')" title="حذف">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function updateStats() {
            document.getElementById('totalNews').textContent = allNews.length;
            let totalViews = allNews.reduce((sum, news) => sum + (news.views || 0), 0);
            document.getElementById('totalViews').textContent = totalViews.toLocaleString();
            
            const categories = new Set(allNews.map(n => n.category));
            document.getElementById('totalCategories').textContent = categories.size;
            
            const authors = new Set(allNews.map(n => n.author));
            document.getElementById('totalAuthors').textContent = authors.size;
        }
        
        window.searchNews = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                displayNews(allNews);
                return;
            }
            const filtered = allNews.filter(news => news.title.toLowerCase().includes(query));
            displayNews(filtered);
            showToast(`تم العثور على ${filtered.length} نتيجة`, 'success');
        };
        
        window.filterByCategory = function() {
            const category = document.getElementById('categoryFilter').value;
            if (category === 'all') {
                displayNews(allNews);
            } else {
                const filtered = allNews.filter(news => news.category === category);
                displayNews(filtered);
            }
        };
        
        window.viewNews = function(id) {
            window.open(`article.html?id=${id}`, '_blank');
        };
        
        window.previewEditImage = function() {
            const imageUrl = document.getElementById('editImage').value;
            const previewDiv = document.getElementById('editImagePreview');
            const previewImg = document.getElementById('editPreviewImg');
            
            if (imageUrl) {
                previewImg.src = imageUrl;
                previewDiv.style.display = 'block';
                previewImg.onerror = () => previewDiv.style.display = 'none';
            } else {
                previewDiv.style.display = 'none';
            }
        };
        
        window.openEditModal = async function(id) {
            currentEditId = id;
            const news = allNews.find(n => n.id === id);
            if (!news) return;
            
            document.getElementById('editTitle').value = news.title || '';
            document.getElementById('editExcerpt').value = news.excerpt || '';
            document.getElementById('editContent').value = news.content || '';
            document.getElementById('editCategory').value = news.category || 'سياسة';
            document.getElementById('editImage').value = news.image || '';
            document.getElementById('editAuthor').value = news.author || '';
            
            if (news.image) {
                document.getElementById('editPreviewImg').src = news.image;
                document.getElementById('editImagePreview').style.display = 'block';
            } else {
                document.getElementById('editImagePreview').style.display = 'none';
            }
            
            document.getElementById('editModal').classList.add('active');
        };
        
        window.closeEditModal = function() {
            document.getElementById('editModal').classList.remove('active');
            currentEditId = null;
        };
        
        window.saveEdit = async function() {
            if (!currentEditId) return;
            
            const updatedData = {
                title: document.getElementById('editTitle').value,
                excerpt: document.getElementById('editExcerpt').value,
                content: document.getElementById('editContent').value,
                category: document.getElementById('editCategory').value,
                image: document.getElementById('editImage').value,
                author: document.getElementById('editAuthor').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                await db.collection('news').doc(currentEditId).update(updatedData);
                showToast('✅ تم تعديل الخبر بنجاح', 'success');
                closeEditModal();
                loadNews();
            } catch (error) {
                console.error('خطأ:', error);
                showToast('❌ خطأ في التعديل: ' + error.message, 'error');
            }
        };
        
        window.deleteNews = async function(id) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا الخبر؟ لا يمكن التراجع عن هذا الإجراء.')) {
                return;
            }
            
            try {
                await db.collection('news').doc(id).delete();
                showToast('✅ تم حذف الخبر بنجاح', 'success');
                loadNews();
            } catch (error) {
                console.error('خطأ:', error);
                showToast('❌ خطأ في الحذف: ' + error.message, 'error');
            }
        };
        
        document.getElementById('searchInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchNews();
        });
    </script>
</body>
</html>
